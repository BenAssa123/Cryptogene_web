<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptogene | Password Synthesis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="dna-canvas"></canvas>
<div class="scanline"></div>

<div class="container">

  <header class="site-header">
    <h1 class="pixel-title">Password Synthesis</h1>
    <p class="tagline">Single use &nbsp;:&nbsp; Be precise</p>
  </header>

  <main>
    <section class="form-section single">
      <div class="form-card">
        <form id="cryptogene-form" autocomplete="off">
          <div class="field">
            <label for="email">Verification *</label>
            <input type="email" id="email" name="email" placeholder="your email address" required>
          </div>

          <div class="field">
            <label for="memoryword">Memory word *</label>
            <input type="text" id="memoryword" name="memoryword" placeholder="file name" required>
          </div>

          <div class="field">
            <label for="password">Generate Password *</label>
            <textarea id="password" name="password" rows="5" placeholder="create a strong 12-character password" required minlength="12"></textarea>
          </div>

          <button type="submit" id="submit-btn">
            <span class="btn-text">Synthesize</span>
            <span class="btn-loading">Synthesizing<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
          </button>

          <div id="status-msg" class="status-msg"></div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 CRYPTOGENE — Single-use password synthesis, encrypted end-to-end.</p>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
</html>
